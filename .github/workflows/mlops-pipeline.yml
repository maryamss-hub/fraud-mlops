name: mlops-pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      trigger_reason:
        description: "Reason for retraining trigger"
        required: false
        default: "manual"

permissions:
  contents: read
  packages: write

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint (flake8)
        run: |
          flake8 src/ tests/ --max-line-length=120 --ignore=E501,W503,E203
      - name: Unit tests (pytest)
        run: |
          pytest -q tests
      - name: Data validation smoke test
        run: |
          python -c "import pandas as pd; from pipelines.components.validate import validate_basic_schema; df=pd.DataFrame({'TransactionID':[1,2],'TransactionDT':[10,20],'isFraud':[0,1]}); r=validate_basic_schema(df); assert r['success'], r"

  build-docker:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push training image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/training/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/fraud-training:latest
      - name: Build and push inference image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/inference/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/fraud-inference:latest

  deploy-kubeflow:
    needs: build-docker
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile pipeline spec
        run: |
          python pipelines/pipeline.py
      - name: Trigger Kubeflow pipeline run
        env:
          KFP_HOST: ${{ secrets.KFP_HOST }}
          KFP_NAMESPACE: ${{ secrets.KFP_NAMESPACE }}
          KFP_EXPERIMENT: ${{ secrets.KFP_EXPERIMENT }}
        run: |
          python - <<'PY'
          import os
          from kfp import Client
          host = os.environ.get("KFP_HOST")
          namespace = os.environ.get("KFP_NAMESPACE", "fraud-detection")
          experiment_name = os.environ.get("KFP_EXPERIMENT", "fraud-mlops")
          if not host:
              raise SystemExit("KFP_HOST secret is required to trigger a pipeline run.")
          client = Client(host=host, namespace=namespace)
          exp = client.create_experiment(name=experiment_name, namespace=namespace)
          run = client.create_run_from_pipeline_package(
              "pipelines/fraud_pipeline.yaml",
              arguments={"transactions_csv": "transactions.csv", "identity_csv": "identity.csv"},
              experiment_id=exp.experiment_id,
              run_name="fraud-mlops-ci-run",
          )
          print(run.run_id)
          PY

  intelligent-retrain:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run drift check + retraining (synthetic demo)
        env:
          TRIGGER_REASON: ${{ inputs.trigger_reason }}
        run: |
          python - <<'PY'
          import numpy as np
          import pandas as pd
          from sklearn.metrics import recall_score
          from sklearn.model_selection import train_test_split
          from xgboost import XGBClassifier
          from src.drift_detector import detect_feature_drift
          from src.retrain import run_retrain_pipeline
          rng = np.random.default_rng(42)
          X = pd.DataFrame(rng.normal(size=(400, 10)), columns=[f"f{i}" for i in range(10)])
          y = pd.Series((rng.random(400) < 0.07).astype(int))
          X_tr, X_te, y_tr, y_te = train_test_split(X, y, test_size=0.3, random_state=42, stratify=y)
          model = XGBClassifier(n_estimators=100, max_depth=3, learning_rate=0.1, objective="binary:logistic", eval_metric="auc", random_state=42)
          model.fit(X_tr.values, y_tr.values)
          prob = model.predict_proba(X_te.values)[:, 1]
          pred = (prob >= 0.5).astype(int)
          rec = float(recall_score(y_te.values, pred, zero_division=0))
          drift = detect_feature_drift(X_tr, X_te, threshold=0.2)
          _ = run_retrain_pipeline(X, y)
          print({"recall": rec, "drift_max_psi": drift.get("_summary", {}).get("max_psi", 0.0)})
          PY
